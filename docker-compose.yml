version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: accesstwin_postgis
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: accesstwin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data: